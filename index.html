<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Motorola P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --lcd-bg: #94b447; 
            --lcd-text: #1a1f0e; 
            --lcd-tx: #ffb100; /* Ámbar cuando transmite */
        }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Chasis del Walkie Talkie */
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px 40px 50px 50px; border: 5px solid #111; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        
        /* Pantalla LCD Motorola */
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 90px; color: var(--lcd-text); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s ease; }
        .screen.transmitting { background: var(--lcd-tx); }
        
        #header-display { font-size: 1rem; font-weight: bold; margin: 0; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        
        .setup-ui input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #444; color: #0f0; text-align: center; font-family: inherit; border-radius: 5px; outline: none; box-sizing: border-box; font-size: 1.1rem; }
        .btn-enter { width: 100%; padding: 15px; background: #333; color: #eee; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 4px #000; text-transform: uppercase; }
        .btn-enter:active { transform: translateY(3px); box-shadow: 0 1px #000; }

        /* Botón PTT */
        #ptt { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 10px #111; }
        #ptt.ready { display: block; }
        #ptt:active { background: radial-gradient(#f00, #900); transform: translateY(5px); box-shadow: 0 4px #111; }
        
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    
    <div class="screen" id="lcd">
        <h2 id="header-display">RADIO OFF</h2>
        <div id="status-lcd">ESPERANDO GRUPO</div>
    </div>

    <div id="setup" class="setup-ui">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR</button>
    </div>

    <button id="ptt" onmousedown="toggleMic(true)" onmouseup="toggleMic(false)" ontouchstart="toggleMic(true)" ontouchend="toggleMic(false)"></button>
</div>

<div id="audios-container"></div>

<script>
    let peer, localStream;
    let peersConectados = new Set();
    let nombreGrupo = "";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Generador de Bips de Radio
    function playBip(frec, dur) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = frec;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    async function iniciarRadio() {
        nombreGrupo = document.getElementById('room').value.trim().toUpperCase();
        if (!nombreGrupo) return alert("Ingresa un nombre de grupo");

        try {
            // Configuración de audio robusta (basada en tus archivos)
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // Slot automático (intenta del 1 al 20)
            const miSlot = Math.floor(Math.random() * 20) + 1;
            
            // Configuración Peer con servidores STUN de Google para máxima compatibilidad
            peer = new Peer(`${nombreGrupo.toLowerCase()}-ch-${miSlot}`, {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = nombreGrupo;
                playBip(880, 0.1);
                
                actualizarConteo();
                escanearFrecuencias(nombreGrupo.toLowerCase(), miSlot);
            });

            peer.on('call', call => {
                call.answer(localStream);
                recibirAudio(call);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Si el slot aleatorio falla, intenta de nuevo automáticamente
                    iniciarRadio();
                }
            });

        } catch (e) {
            alert("Error: Activa el micro y usa HTTPS (imprescindible)");
        }
    }

    // Escaneo automático de los 20 canales posibles del grupo
    function escanearFrecuencias(sala, miSlot) {
        for (let i = 1; i <= 20; i++) {
            if (i == miSlot) continue;
            const targetId = `${sala}-ch-${i}`;
            const call = peer.call(targetId, localStream);
            if (call) recibirAudio(call);
        }
    }

    function recibirAudio(call) {
        call.on('stream', stream => {
            if (!peersConectados.has(call.peer)) {
                peersConectados.add(call.peer);
                
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true; // Crítico para móviles
                document.getElementById('audios-container').appendChild(audio);
                
                playBip(1200, 0.1); // Bip de entrada
                actualizarConteo();
            }
        });
    }

    function actualizarConteo() {
        const total = peersConectados.size + 1;
        document.getElementById('status-lcd').innerText = `${total} EN LINEA`;
    }

    const ptt = document.getElementById('ptt');
    const lcd = document.getElementById('lcd');
    const led = document.getElementById('tx-led');

    function toggleMic(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            
            if (on) {
                led.classList.add('on');
                lcd.classList.add('transmitting');
                document.getElementById('status-lcd').innerText = "TRANSMITIENDO...";
                playBip(600, 0.05);
            } else {
                led.classList.remove('on');
                lcd.classList.remove('transmitting');
                actualizarConteo();
                playBip(300, 0.1);
            }
        }
    }
</script>
</body>
</html>
