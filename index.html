<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motorola Global P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --lcd-bg: #94b447; --lcd-text: #1a1f0e; --lcd-tx: #ffb100; }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px; border: 5px solid #111; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 90px; color: var(--lcd-text); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; }
        .screen.transmitting { background: var(--lcd-tx); }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #0f0; text-align: center; border-radius: 5px; }
        .btn-enter { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #ptt { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; }
        #ptt.ready { display: block; }
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    <div class="screen" id="lcd">
        <h2 id="header-display" style="font-size: 1rem; margin:0;">RADIO OFF</h2>
        <div id="status-lcd">LISTO PARA CONECTAR</div>
    </div>
    <div id="setup">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <input type="number" id="my-slot" placeholder="CANAL (1-20)" min="1" max="20">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR FRECUENCIA</button>
    </div>
    <button id="ptt" onmousedown="toggleMic(true)" onmouseup="toggleMic(false)" ontouchstart="toggleMic(true)" ontouchend="toggleMic(false)"></button>
</div>

<div id="audios-container"></div>

<script>
    let peer, localStream;
    let peersConectados = new Set();
    let nombreGrupo = "";

    async function iniciarRadio() {
        nombreGrupo = document.getElementById('room').value.trim().toUpperCase();
        const slot = document.getElementById('my-slot').value;
        if (!nombreGrupo || !slot) return alert("Completa los datos");

        try {
            // Solicitar micrófono
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // CONFIGURACIÓN CRÍTICA PARA COMUNICACIÓN ENTRE CIUDADES
            peer = new Peer(`${nombreGrupo.toLowerCase()}-ch-${slot}`, {
                config: {
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'stun:stun1.l.google.com:19302' },
                        { 'urls': 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = nombreGrupo;
                
                // Escanear 20 canales para encontrar amigos en otras ciudades
                escanearFrecuencias(nombreGrupo.toLowerCase(), slot);
            });

            peer.on('call', call => {
                call.answer(localStream);
                enlazarAudio(call);
            });

        } catch (e) {
            alert("Error: Activa el micro y usa HTTPS");
        }
    }

    function escanearFrecuencias(sala, miSlot) {
        for (let i = 1; i <= 20; i++) {
            if (i == miSlot) continue; 
            const call = peer.call(`${sala}-ch-${i}`, localStream);
            if (call) enlazarAudio(call);
        }
    }

    function enlazarAudio(call) {
        call.on('stream', stream => {
            if (!peersConectados.has(call.peer)) {
                peersConectados.add(call.peer);
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true; //
                document.getElementById('audios-container').appendChild(audio);
                actualizarConteo();
            }
        });
    }

    function actualizarConteo() {
        const total = peersConectados.size + 1;
        document.getElementById('status-lcd').innerText = `${total} EN LINEA`;
    }

    function toggleMic(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('tx-led').classList.toggle('on', on);
            document.getElementById('lcd').classList.toggle('transmitting', on);
            document.getElementById('status-lcd').innerText = on ? "TRANSMITIENDO..." : `${peersConectados.size + 1} EN LINEA`;
        }
    }
</script>
</body>
</html>
