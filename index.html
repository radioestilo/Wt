<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motorola P2P - 20 Users</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --lcd-bg: #94b447; --lcd-text: #1a1f0e; --lcd-tx: #ffb100; }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px; border: 5px solid #111; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 90px; color: var(--lcd-text); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .screen.transmitting { background: var(--lcd-tx); }
        #header-display { font-size: 1rem; font-weight: bold; margin: 0; text-transform: uppercase; }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #444; color: #0f0; text-align: center; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        .btn-enter { width: 100%; padding: 15px; background: #333; color: #eee; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 4px #000; }
        #ptt { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        #ptt.ready { display: block; }
        #ptt:active { background: radial-gradient(#f00, #900); transform: translateY(5px); box-shadow: 0 4px #111; }
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    <div class="screen" id="lcd">
        <h2 id="header-display">RADIO OFF</h2>
        <div id="status-lcd">INGRESE GRUPO</div>
    </div>
    <div id="setup">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR</button>
    </div>
    <button id="ptt" onmousedown="hablar(true)" onmouseup="hablar(false)" ontouchstart="hablar(true)" ontouchend="hablar(false)"></button>
</div>

<div id="audios-container"></div>

<script>
    let peer, localStream;
    let conexiones = new Set();
    let nombreGrupo = "";
    let miSlot = 1;

    async function iniciarRadio(intento = 1) {
        nombreGrupo = document.getElementById('room').value.trim().toUpperCase();
        if (!nombreGrupo) return alert("Escribe un grupo");
        miSlot = intento;

        try {
            // 1. Obtener audio con parámetros de alta calidad para Chrome
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                localStream.getAudioTracks()[0].enabled = false;
            }

            // 2. Intentar conectar en un slot (ID) único
            // Usamos una estructura de ID que permita hasta 20 personas: grupo-ch-1, grupo-ch-2...
            peer = new Peer(`${nombreGrupo.toLowerCase()}-ch-${miSlot}`, {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] },
                debug: 1
            });

            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = nombreGrupo;
                actualizarPantalla();
                
                // 3. Escaneo expansivo: Llama a todos los otros 19 canales posibles
                for (let i = 1; i <= 20; i++) {
                    if (i === miSlot) continue;
                    const call = peer.call(`${nombreGrupo.toLowerCase()}-ch-${i}`, localStream);
                    if (call) recibirVoz(call);
                }
            });

            peer.on('call', call => {
                call.answer(localStream);
                recibirVoz(call);
            });

            peer.on('error', (err) => {
                // Si el slot está ocupado, saltar al siguiente automáticamente hasta llegar a 20
                if (err.type === 'unavailable-id' && miSlot < 20) {
                    peer.destroy();
                    iniciarRadio(miSlot + 1);
                } else {
                    console.error("Error de Peer:", err);
                }
            });

        } catch (e) {
            alert("Error: Chrome requiere HTTPS y permiso de micrófono.");
        }
    }

    function recibirVoz(call) {
        call.on('stream', stream => {
            if (!conexiones.has(call.peer)) {
                conexiones.add(call.peer);
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true; // Necesario para móviles
                document.getElementById('audios-container').appendChild(audio);
                actualizarPantalla();
            }
        });
        
        call.on('close', () => {
            conexiones.delete(call.peer);
            actualizarPantalla();
        });
    }

    function actualizarPantalla() {
        const total = conexiones.size + 1;
        document.getElementById('status-lcd').innerText = `${total} EN LINEA (CH-${miSlot})`;
    }

    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('tx-led').classList.toggle('on', on);
            document.getElementById('lcd').classList.toggle('transmitting', on);
            document.getElementById('status-lcd').innerText = on ? "TRANSMITIENDO..." : `${conexiones.size + 1} EN LINEA (CH-${miSlot})`;
        }
    }
</script>
</body>
</html>
