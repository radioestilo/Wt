<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motorola Global System</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --lcd-bg: #94b447; --lcd-text: #1a1f0e; --lcd-tx: #ffb100; }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px; border: 5px solid #111; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 100px; color: var(--lcd-text); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; box-shadow: inset 0 0 10px rgba(0,0,0,0.4); }
        .screen.transmitting { background: var(--lcd-tx); }
        #header-display { font-size: 1rem; font-weight: bold; margin: 0; text-transform: uppercase; white-space: nowrap; overflow: hidden; }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #444; color: #0f0; text-align: center; border-radius: 5px; font-family: inherit; font-size: 1.1rem; }
        .btn-enter { width: 100%; padding: 15px; background: #333; color: #eee; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 4px #000; }
        #ptt { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 8px #111; }
        #ptt.ready { display: block; }
        #ptt:active { background: radial-gradient(#f00, #900); transform: translateY(4px); box-shadow: 0 2px #111; }
        .led { width: 12px; height: 12px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    <div class="screen" id="lcd">
        <h2 id="header-display">SISTEMA OFF</h2>
        <div id="status-lcd">INGRESE GRUPO</div>
    </div>
    <div id="setup">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR RED GLOBAL</button>
    </div>
    <button id="ptt" onmousedown="hablar(true)" onmouseup="hablar(false)" ontouchstart="hablar(true)" ontouchend="hablar(false)"></button>
</div>

<div id="audios"></div>

<script>
    // TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDTydyoLDJHi-Mtf61IPkhzeHL_4GWAt7g",
        authDomain: "radio-1077c.firebaseapp.com",
        databaseURL: "https://radio-1077c-default-rtdb.firebaseio.com",
        projectId: "radio-1077c",
        appId: "1:955699604469:web:ee162a8f7920cee4844ebc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, myRoom;
    let conexionesActivas = {};

    async function iniciarRadio() {
        myRoom = document.getElementById('room').value.trim().toUpperCase();
        if (!myRoom) return;

        try {
            // Solicitar audio con máxima compatibilidad
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // CONFIGURACIÓN DE PUENTE GLOBAL (STUN + TURN GRATUITO)
            peer = new Peer('MOTO-' + Math.random().toString(36).substr(2, 8), {
                config: {
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'stun:stun1.l.google.com:19302' },
                        // Este servidor TURN ayuda a cruzar entre ciudades/4G
                        {
                            'urls': 'turn:openrelay.metered.ca:443',
                            'username': 'openrelayprovider',
                            'credential': 'openrelayprovider'
                        }
                    ]
                }
            });

            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = myRoom;

                const ref = db.ref(`radio_rooms/${myRoom}`);
                ref.child(id).set(true);
                ref.child(id).onDisconnect().remove();

                ref.on('child_added', snap => {
                    const remoteId = snap.key;
                    if (remoteId !== id && !conexionesActivas[remoteId]) {
                        const call = peer.call(remoteId, localStream);
                        vincular(call);
                    }
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                vincular(call);
            });

        } catch (e) { alert("Acceso al micro denegado. Use HTTPS."); }
    }

    function vincular(call) {
        call.on('stream', stream => {
            if (!conexionesActivas[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true; // Crítico para móviles
                document.getElementById('audios').appendChild(audio);
                conexionesActivas[call.peer] = call;
                actualizarPantalla();
            }
        });
        call.on('close', () => { delete conexionesActivas[call.peer]; actualizarPantalla(); });
    }

    function actualizarPantalla() {
        const count = Object.keys(conexionesActivas).length + 1;
        document.getElementById('status-lcd').innerText = `${count} EN LINEA`;
    }

    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('tx-led').classList.toggle('on', on);
            document.getElementById('lcd').classList.toggle('transmitting', on);
            document.getElementById('status-lcd').innerText = on ? "TRANSMITIENDO..." : `${Object.keys(conexionesActivas).length + 1} EN LINEA`;
        }
    }
</script>
</body>
</html>
