<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Pro | Agora</title>
    <style>
        :root { --rojo: #ff3e3e; --verde: #00ff41; --fondo: #121212; }
        
        body { 
            background: var(--fondo); color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; touch-action: none; overflow: hidden;
        }

        /* Indicador LED */
        .led { width: 15px; height: 15px; border-radius: 50%; background: #333; margin-bottom: 20px; transition: 0.3s; }
        .led-online { background: var(--verde); box-shadow: 0 0 10px var(--verde); }
        .led-talking { background: var(--rojo); box-shadow: 0 0 15px var(--rojo); }

        /* Botón de Radio */
        #ptt-btn {
            width: 240px; height: 240px; border-radius: 50%; border: 12px solid #333;
            background: #444; color: #777; font-size: 1.4rem; font-weight: bold;
            cursor: pointer; user-select: none; outline: none; transition: 0.1s;
            -webkit-tap-highlight-color: transparent; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* Botón listo para usar */
        .ready { 
            background: radial-gradient(circle, var(--rojo) 0%, #8b0000 100%) !important; 
            color: white !important; border-color: #444 !important; 
        }

        /* Botón mientras hablas */
        .talking { transform: scale(0.92); filter: brightness(1.3); box-shadow: 0 0 50px var(--rojo) !important; }

        /* Consola de Debug */
        #console { 
            margin-top: 25px; width: 85%; max-width: 450px; height: 130px; 
            background: #000; border: 1px solid #333; color: var(--verde); 
            font-size: 0.75rem; padding: 12px; overflow-y: auto; border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
        }

        .instruction { margin-top: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="led" class="led"></div>
    <button id="ptt-btn">INICIANDO...</button>
    
    <div id="console"></div>
    <div class="instruction">Usa HTTPS para activar el micrófono</div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

    <script>
        // CONFIGURACIÓN
        const APP_ID = "ac7885d72d594551a5bb3cc540ba4ef6"; 
        const CHANNEL = "walkie-talkie-room";
        
        const btn = document.getElementById('ptt-btn');
        const consoleDiv = document.getElementById('console');
        const led = document.getElementById('led');

        function print(msg) {
            const now = new Date();
            const time = now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();
            consoleDiv.innerHTML += `[${time}] ${msg}<br>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Sonidos de Radio (Beeps)
        function playBeep(freq, volume, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.error("Audio error", e); }
        }

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack = null;
        let isSystemReady = false;

        async function startSystem() {
            try {
                print("Conectando con servidores...");
                await client.join(APP_ID, CHANNEL, null, null);
                
                print("Accediendo al micrófono...");
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                
                // SOLUCIÓN AL ERROR: Publicamos primero (encendido)
                await client.publish(localAudioTrack);
                
                // Y silenciamos inmediatamente para el modo Walkie-Talkie
                await localAudioTrack.setEnabled(false);

                isSystemReady = true;
                btn.innerText = "MANTÉN PULSADO";
                btn.classList.add('ready');
                led.classList.add('led-online');
                print("SISTEMA ONLINE. Canal: " + CHANNEL);

            } catch (e) {
                print("ERROR CRÍTICO: " + e.message);
                if (e.message.includes("Permission")) {
                    print("⚠️ DEBES DAR PERMISO AL MICRÓFONO.");
                }
            }
        }

        // Escuchar a otros amigos
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                print("Recibiendo señal entrante...");
                user.audioTrack.play();
                led.style.background = "orange"; // Luz naranja cuando alguien más habla
            }
        });

        client.on("user-unpublished", () => {
            led.style.background = ""; 
            led.classList.add('led-online');
            playBeep(440, 0.05, 0.2); // Beep de fin de recepción
        });

        // FUNCIONES DE TRANSMISIÓN
        const startTalking = async (e) => {
            if (!isSystemReady) return;
            if (e) e.preventDefault();
            
            try {
                playBeep(660, 0.1, 0.1); // Beep de inicio
                await localAudioTrack.setEnabled(true);
                btn.classList.add('talking');
                led.classList.add('led-talking');
                btn.innerText = "HABLANDO...";
                print("Transmitiendo voz...");
            } catch (err) { print("Error al hablar: " + err.message); }
        };

        const stopTalking = async () => {
            if (!isSystemReady) return;
            
            try {
                await localAudioTrack.setEnabled(false);
                btn.classList.remove('talking');
                led.classList.remove('led-talking');
                btn.innerText = "MANTÉN PULSADO";
                playBeep(440, 0.1, 0.2); // Roger beep
                print("Cambio y corto.");
            } catch (err) { print("Error al callar: " + err.message); }
        };

        // EVENTOS PARA MÓVIL Y PC
        btn.onpointerdown = startTalking;
        btn.onpointerup = stopTalking;
        btn.onpointerleave = stopTalking;

        // Arrancar al cargar la página
        window.onload = startSystem;
    </script>
</body>
</html>
