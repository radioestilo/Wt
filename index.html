<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Walkie-Talkie Debug</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; }
        
        #ptt-btn {
            width: 200px; height: 200px; border-radius: 50%; border: 10px solid #333;
            background: #555; color: white; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; user-select: none; outline: none; -webkit-tap-highlight-color: transparent;
        }

        .ready { background: #ff4b2b !important; box-shadow: 0 0 20px rgba(255, 75, 43, 0.5); }
        .talking { background: #00ff41 !important; transform: scale(0.95); box-shadow: 0 0 40px #00ff41; }

        #log { 
            margin-top: 20px; font-size: 0.8rem; color: #00ff41; 
            background: black; padding: 10px; width: 80%; height: 100px; 
            overflow-y: auto; border: 1px solid #333; font-family: monospace;
        }
    </style>
</head>
<body>

    <button id="ptt-btn">CARGANDO...</button>
    <div id="log">Iniciando sistema...</div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

    <script>
        const APP_ID = "eeb52729cbdb4c80a1710e32af5306ca";
        const logDiv = document.getElementById('log');
        const btn = document.getElementById('ptt-btn');

        function print(msg) {
            logDiv.innerHTML += "> " + msg + "<br>";
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTrack = null;
        let isJoined = false;

        async function init() {
            try {
                print("Conectando a Agora...");
                await client.join(APP_ID, "test-channel", null, null);
                isJoined = true;
                
                print("Pidiendo permiso de micro...");
                localTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await localTrack.setEnabled(false);
                await client.publish(localTrack);
                
                btn.innerText = "MANTÉN PULSADO";
                btn.classList.add('ready');
                print("¡LISTO! Ya puedes hablar.");
            } catch (err) {
                print("ERROR: " + err.message);
            }
        }

        // Suscribirse a otros
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                print("Escuchando a un amigo...");
                user.audioTrack.play();
            }
        });

        // Eventos de presión (Pointer events sirven para Mouse y Touch)
        btn.onpointerdown = async (e) => {
            if (!isJoined) return;
            e.preventDefault();
            await localTrack.setEnabled(true);
            btn.classList.add('talking');
            btn.innerText = "HABLANDO...";
            print("Transmitiendo audio...");
        };

        btn.onpointerup = async () => {
            if (!isJoined) return;
            await localTrack.setEnabled(false);
            btn.classList.remove('talking');
            btn.innerText = "MANTÉN PULSADO";
            print("Micrófono cerrado.");
        };

        btn.onpointerleave = btn.onpointerup;

        // Iniciar al cargar
        window.onload = init;
    </script>
</body>
</html>
