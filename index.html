<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Comms Pro</title>
    <style>
        :root { --danger: #ff4b2b; --success: #00ff41; --dark: #0f0f0f; }
        
        body { 
            background: var(--dark); color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; touch-action: none; overflow: hidden;
        }

        /* Contenedor de la Radio */
        .radio-container {
            position: relative; width: 280px; height: 400px;
            background: #222; border-radius: 40px; border: 4px solid #333;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Pantalla de Estado */
        #display {
            width: 80%; height: 60px; background: #1a3a1a; border: 3px solid #000;
            border-radius: 10px; margin-bottom: 30px; padding: 10px;
            color: var(--success); font-family: monospace; font-size: 0.7rem;
            overflow: hidden; box-shadow: inset 0 0 10px #000;
        }

        /* Botón PTT */
        #ptt-btn {
            width: 180px; height: 180px; border-radius: 50%; border: 10px solid #111;
            background: #333; color: #555; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; outline: none; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        /* Botón cuando el sistema está en línea */
        .online { background: radial-gradient(circle, #444 0%, #222 100%) !important; color: #888 !important; border-color: #333 !important; }
        .ready { background: radial-gradient(circle, var(--danger) 0%, #8b0000 100%) !important; color: white !important; border-color: #444 !important; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .active { transform: scale(0.92); filter: brightness(1.3); box-shadow: 0 0 40px var(--danger) !important; }

        .led { width: 12px; height: 12px; border-radius: 50%; background: #000; margin-bottom: 10px; border: 2px solid #333; }
        .led-on { background: var(--success); box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>

    <div class="radio-container">
        <div id="led" class="led"></div>
        <div id="display">SISTEMA APAGADO<br>PRESIONE BOTÓN PARA INICIAR</div>
        <button id="ptt-btn">ENCENDER</button>
        <p style="font-size: 0.6rem; color: #555; margin-top: 20px;">FREQUENCY: 446.0 MHz</p>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

    <script>
        const APP_ID = "ac7885d72d594551a5bb3cc540ba4ef6";
        const CHANNEL = "sala-general";
        
        const btn = document.getElementById('ptt-btn');
        const display = document.getElementById('display');
        const led = document.getElementById('led');

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack = null;
        let isOnline = false;

        function updateDisplay(msg) {
            display.innerHTML = msg.toUpperCase();
        }

        // Sonido de Roger Beep
        function playSound(f, d) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = f;
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + d);
            o.start(); o.stop(ctx.currentTime + d);
        }

        // --- FUNCIÓN DE INICIO (GESTO DEL USUARIO) ---
        async function bootSystem() {
            try {
                updateDisplay("CONECTANDO Club 24...<br>BUSCANDO SEÑAL");
                btn.innerText = "...";
                
                await client.join(APP_ID, CHANNEL, null, null);
                
                // Pidiendo micro
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                
                // Publicar para que Agora acepte el canal
                await client.publish(localAudioTrack);
                // Silenciar inmediatamente
                await localAudioTrack.setEnabled(false);

                isOnline = true;
                btn.innerText = "PTT";
                btn.classList.add('ready');
                led.classList.add('led-on');
                updateDisplay("CONECTADO OK Club 24<br>CANAL: GENERAL");
                playSound(880, 0.1);

            } catch (err) {
                updateDisplay("ERROR CRÍTICO<br>" + err.message);
                btn.innerText = "REINTENTAR";
                console.error(err);
            }
        }

        // Lógica de Transmisión
        const startTalking = async (e) => {
            if (!isOnline) {
                await bootSystem();
                return;
            }
            e.preventDefault();
            await localAudioTrack.setEnabled(true);
            btn.classList.add('active');
            updateDisplay("TRANSMITIENDO CLUB 24...<br>>>>>>>>>");
            playSound(600, 0.05);
        };

        const stopTalking = async () => {
            if (!isOnline) return;
            await localAudioTrack.setEnabled(false);
            btn.classList.remove('active');
            updateDisplay("EN ESPERA...<br>READY");
            playSound(440, 0.15);
        };

        // Eventos unificados (Móvil y PC)
        btn.onpointerdown = startTalking;
        btn.onpointerup = stopTalking;
        btn.onpointerleave = stopTalking;

        // Escuchar a otros
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                updateDisplay("RECIBIENDO...<br>SEÑAL ENTRANTE");
                user.audioTrack.play();
            }
        });
    </script>
</body>
</html>
