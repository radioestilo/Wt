<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motorola Global P2P - 20 Canales</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --lcd-bg: #94b447; --lcd-text: #1a1f0e; --lcd-tx: #ffb100; }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px; border: 5px solid #111; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 95px; color: var(--lcd-text); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; }
        .screen.transmitting { background: var(--lcd-tx); }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #444; color: #0f0; text-align: center; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        .btn-enter { width: 100%; padding: 15px; background: #333; color: #eee; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #ptt { width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        #ptt.ready { display: block; }
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    <div class="screen" id="lcd">
        <h2 id="header-display" style="font-size: 1rem; margin:0;">RADIO OFF</h2>
        <div id="status-lcd">ESPERANDO GRUPO</div>
    </div>
    <div id="setup">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR A LA RED</button>
    </div>
    <button id="ptt" onmousedown="hablar(true)" onmouseup="hablar(false)" ontouchstart="hablar(true)" ontouchend="hablar(false)"></button>
</div>

<div id="audios"></div>

<script>
    let peer, localStream;
    let conexiones = new Set();
    let miCanal = 1;

    async function iniciarRadio(intento = 1) {
        const roomName = document.getElementById('room').value.trim().toUpperCase();
        if (!roomName) return alert("Ingresa un nombre de grupo");
        miCanal = intento;

        try {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
                });
                localStream.getAudioTracks()[0].enabled = false;
            }

            // CONFIGURACIÓN GLOBAL: Servidores para cruzar ciudades
            peer = new Peer(`${roomName.toLowerCase()}-ch-${miCanal}`, {
                config: { 
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'stun:stun1.l.google.com:19302' },
                        { 'urls': 'stun:stun2.l.google.com:19302' }
                    ] 
                }
            });

            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = roomName;
                actualizarPantalla();
                
                // Escaneo expansivo de 20 canales
                for (let i = 1; i <= 20; i++) {
                    if (i === miCanal) continue;
                    const call = peer.call(`${roomName.toLowerCase()}-ch-${i}`, localStream);
                    if (call) vincular(call);
                }
            });

            peer.on('call', call => {
                call.answer(localStream);
                vincular(call);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id' && miCanal < 20) {
                    peer.destroy();
                    iniciarRadio(miCanal + 1); // Salto automático de canal
                }
            });

        } catch (e) { alert("Error: Usa HTTPS y permite el micro."); }
    }

    function vincular(call) {
        call.on('stream', stream => {
            if (!conexiones.has(call.peer)) {
                conexiones.add(call.peer);
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true;
                document.getElementById('audios').appendChild(audio);
                actualizarPantalla();
            }
        });
    }

    function actualizarPantalla() {
        const total = conexiones.size + 1;
        document.getElementById('status-lcd').innerText = `${total} EN LINEA (CH-${miCanal})`;
    }

    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('tx-led').classList.toggle('on', on);
            document.getElementById('lcd').classList.toggle('transmitting', on);
            document.getElementById('status-lcd').innerText = on ? "TRANSMITIENDO..." : `${conexiones.size + 1} EN LINEA`;
        }
    }
</script>
</body>
</html>
