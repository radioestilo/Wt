<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Enlace Global</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #00ff00; --bg: #000; }
        body { background: var(--bg); color: var(--p); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .box { border: 2px solid var(--p); border-radius: 20px; width: 320px; padding: 30px; box-shadow: 0 0 20px rgba(0,255,0,0.2); text-align: center; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid var(--p); color: var(--p); border-radius: 10px; margin-bottom: 10px; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #ptt { 
            width: 180px; height: 180px; border-radius: 50%; background: #111; border: 5px solid #333; 
            margin: 20px auto; display: none; color: #444; font-size: 1.2rem; cursor: pointer;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        #ptt.online { display: block; border-color: var(--p); color: var(--p); }
        #ptt:active { background: #f00; color: #fff; border-color: #500; transform: scale(0.95); }
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; margin: 0 auto 10px; }
        .led.on { background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

<div class="box">
    <div class="led" id="led"></div>
    <div id="status">SISTEMA APAGADO</div>
    
    <div id="login-ui">
        <input type="text" id="grupo" placeholder="NOMBRE DEL GRUPO">
        <button onclick="conectar()">Iniciar Radio</button>
    </div>

    <button id="ptt">PULSAR</button>
    <div id="users" style="font-size: 0.7rem; margin-top: 15px; color: #666;"></div>
</div>

<div id="audio-container"></div>

<script>
    // TUS DATOS DE FIREBASE (PROYECTO: radio-1077c)
    const firebaseConfig = {
        apiKey: "AIzaSyDTydyoLDJHi-Mtf61IPkhzeHL_4GWAt7g",
        authDomain: "radio-1077c.firebaseapp.com",
        databaseURL: "https://radio-1077c-default-rtdb.firebaseio.com",
        projectId: "radio-1077c",
        appId: "1:955699604469:web:ee162a8f7920cee4844ebc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, room;
    let conexiones = {};

    async function conectar() {
        room = document.getElementById('grupo').value.trim().toLowerCase();
        if(!room) return alert("Escribe un grupo");

        try {
            // 1. Pedir micrófono con ajustes para internet lento
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // 2. PeerJS con SERVIDORES DE RELEVO (TURN)
            // Esto es lo que permite que el audio viaje entre ciudades
            peer = new Peer('RAD-' + Math.random().toString(36).substr(2, 7), {
                config: {
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'turn:openrelay.metered.ca:443', 'username': 'openrelayprovider', 'credential': 'openrelayprovider' }
                    ]
                }
            });

            peer.on('open', (id) => {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('ptt').classList.add('online');
                document.getElementById('status').innerText = "GRUPO: " + room.toUpperCase();
                
                // Registrarme en tu base de datos
                const ref = db.ref('radio_v4/' + room);
                ref.child(id).set(true);
                ref.child(id).onDisconnect().remove();

                // Escuchar quién más entra para llamarlo
                ref.on('child_added', snap => {
                    if (snap.key !== id && !conexiones[snap.key]) {
                        vincular(peer.call(snap.key, localStream));
                    }
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                vincular(call);
            });

        } catch (e) { alert("Error: Usa HTTPS y permite el micro."); }
    }

    function vincular(call) {
        call.on('stream', stream => {
            if (!conexiones[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true;
                document.getElementById('audio-container').appendChild(audio);
                conexiones[call.peer] = true;
                actualizarUI();
            }
        });
        call.on('close', () => { delete conexiones[call.peer]; actualizarUI(); });
    }

    function actualizarUI() {
        const n = Object.keys(conexiones).length;
        document.getElementById('users').innerText = (n + 1) + " EQUIPOS ACTIVOS";
    }

    // BOTÓN PTT
    const btn = document.getElementById('ptt');
    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('led').classList.toggle('on', on);
            document.getElementById('status').innerText = on ? "TRANSMITIENDO..." : "GRUPO: " + room.toUpperCase();
            document.getElementById('status').style.color = on ? "#f00" : "#0f0";
        }
    }

    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); hablar(true); };
    btn.onmouseup = btn.ontouchend = (e) => { e.preventDefault(); hablar(false); };
</script>
</body>
</html>
