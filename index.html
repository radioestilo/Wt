<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Global Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #00ff41; --bg: #0d0d0d; }
        body { background: var(--bg); color: var(--p); font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .case { border: 3px solid #333; border-radius: 30px; width: 320px; padding: 25px; background: #1a1a1a; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center; position: relative; }
        .screen { background: #222; border: 5px solid #111; border-radius: 10px; padding: 15px; margin-bottom: 20px; color: var(--p); min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--p); color: var(--p); border-radius: 5px; margin-bottom: 10px; text-align: center; }
        .btn-link { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #ptt { 
            width: 170px; height: 170px; border-radius: 50%; background: radial-gradient(#333, #111); border: 8px solid #000; 
            margin: 10px auto; display: none; color: #555; font-size: 1rem; cursor: pointer;
            -webkit-tap-highlight-color: transparent; user-select: none; box-shadow: 0 5px 0 #000;
        }
        #ptt.ready { display: block; color: var(--p); }
        #ptt:active { background: #f00; transform: translateY(4px); box-shadow: 0 1px 0 #000; color: white; }
        .indicator { width: 12px; height: 12px; background: #400; border-radius: 50%; position: absolute; top: 15px; right: 30px; }
        .indicator.on { background: #f00; box-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

<div class="case">
    <div class="indicator" id="led"></div>
    <div class="screen" id="status">RADIO APAGADA</div>
    
    <div id="ui-login">
        <input type="text" id="canal" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-link" onclick="conectar()">CONECTAR A RED GLOBAL</button>
    </div>

    <button id="ptt">PTT</button>
    <div id="count" style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6;"></div>
</div>

<div id="audio-box"></div>

<script>
    // Configuración de tu Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDTydyoLDJHi-Mtf61IPkhzeHL_4GWAt7g",
        authDomain: "radio-1077c.firebaseapp.com",
        databaseURL: "https://radio-1077c-default-rtdb.firebaseio.com",
        projectId: "radio-1077c",
        appId: "1:955699604469:web:ee162a8f7920cee4844ebc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, room;
    let peersActivos = {};

    async function conectar() {
        room = document.getElementById('canal').value.trim().toLowerCase();
        if(!room) return;

        try {
            // Capturar audio con configuración para red móvil
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // CONFIGURACIÓN DE CRUCE DE OPERADORES (TURN)
            // Usamos un servidor "Relé" que transporta la voz cuando el 4G bloquea el paso directo
            peer = new Peer('RAD-' + Math.random().toString(36).substr(2, 6), {
                config: {
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 
                            'urls': 'turn:openrelay.metered.ca:443', 
                            'username': 'openrelayprovider', 
                            'credential': 'openrelayprovider' 
                        }
                    ],
                    'sdpSemantics': 'unified-plan'
                }
            });

            peer.on('open', (id) => {
                document.getElementById('ui-login').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('status').innerText = "EN LÍNEA: " + room.toUpperCase();
                
                const ref = db.ref('global_radio/' + room);
                ref.child(id).set(true);
                ref.child(id).onDisconnect().remove();

                ref.on('child_added', snap => {
                    if (snap.key !== id && !peersActivos[snap.key]) {
                        hacerLlamada(snap.key);
                    }
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                recibirLlamada(call);
            });

        } catch (e) { alert("Error: Activa el micro y usa HTTPS"); }
    }

    function hacerLlamada(peerId) {
        const call = peer.call(peerId, localStream);
        recibirLlamada(call);
    }

    function recibirLlamada(call) {
        call.on('stream', stream => {
            if (!peersActivos[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = stream;
                audio.autoplay = true;
                audio.playsinline = true;
                document.getElementById('audio-box').appendChild(audio);
                peersActivos[call.peer] = true;
                actualizarContador();
            }
        });
        call.on('close', () => { delete peersActivos[call.peer]; actualizarContador(); });
    }

    function actualizarContador() {
        const n = Object.keys(peersActivos).length;
        document.getElementById('count').innerText = (n + 1) + " EQUIPOS EN LA RED";
    }

    const btn = document.getElementById('ptt');
    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('led').classList.toggle('on', on);
            document.getElementById('status').innerText = on ? "TRANSMITIENDO..." : "EN LÍNEA: " + room.toUpperCase();
            document.getElementById('status').style.color = on ? "#f00" : "#00ff41";
        }
    }

    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); hablar(true); };
    btn.onmouseup = btn.ontouchend = (e) => { e.preventDefault(); hablar(false); };
</script>
</body>
</html>
