<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Scanner Global</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #0f0; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #0f0; padding: 20px; border-radius: 15px; max-width: 350px; margin: auto; box-shadow: 0 0 15px #0f0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #0f0; color: #0f0; text-align: center; border-radius: 5px; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #ptt { 
            width: 180px; height: 180px; border-radius: 50%; background: #222; color: #444; 
            font-size: 1.2rem; margin: 30px auto; border: 10px solid #111; display: none;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #ptt.ready { display: block; border-color: #333; color: #0f0; }
        #ptt:active { background: #f00; color: #fff; box-shadow: 0 0 40px #f00; transform: scale(0.92); }
        .status-box { font-size: 0.8rem; margin: 10px 0; color: #ff9d00; border: 1px dashed #444; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">MODO INTERNET</h2>
    <div id="setup">
        <input type="text" id="room" placeholder="Nombre del Grupo">
        <input type="number" id="my-slot" placeholder="Canal (1-20)" min="1" max="20">
        <button class="btn" onclick="iniciarRadio()">CONECTAR RED MÓVIL/WIFI</button>
    </div>
    <div id="radio-ui" style="display:none">
        <div id="status" class="status-box">ESTADO: SINCRONIZANDO...</div>
        <div id="user-count" style="font-size: 0.8rem; color: #888;">0 Compañeros</div>
        <button id="ptt">PULSAR</button>
    </div>
</div>

<div id="audios"></div>

<script>
    // USANDO TUS CREDENCIALES DE BODEGA VIRTUAL
    const firebaseConfig = {
        apiKey: "AIzaSyD73Fli73cewNUX-Rj6YeZKlb97AcMrqL0",
        authDomain: "bodega-virtual-3e69b.firebaseapp.com",
        databaseURL: "https://bodega-virtual-3e69b-default-rtdb.firebaseio.com",
        projectId: "bodega-virtual-3e69b",
        appId: "1:889100967352:web:c626d959183115806d834d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, myRoom;
    let conexiones = {};

    async function iniciarRadio() {
        myRoom = document.getElementById('room').value.trim().toLowerCase();
        const slot = document.getElementById('my-slot').value;
        if (!myRoom || !slot) return alert("Ingresa grupo y canal");

        try {
            // Activar audio con configuraciones de reducción de ruido
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // CONFIGURACIÓN DE CRUCE DE REDES (STUN/TURN)
            // Esto permite que el audio pase de WiFi a Datos Móviles sin problema
            peer = new Peer(`RAD-${myRoom}-${slot}`, {
                config: { 'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 
                        'urls': 'turn:openrelay.metered.ca:443', 
                        'username': 'openrelayprovider', 
                        'credential': 'openrelayprovider' 
                    }
                ]}
            });

            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('radio-ui').style.display = 'block';
                document.getElementById('status').innerText = "SINTONIZANDO RED...";

                const ref = db.ref(`radio_rooms/${myRoom}`);
                ref.child(id).set(true);
                ref.child(id).onDisconnect().remove();

                ref.on('child_added', snap => {
                    if (snap.key !== id && !conexiones[snap.key]) {
                        const call = peer.call(snap.key, localStream);
                        vincular(call);
                    }
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                vincular(call);
            });

        } catch (e) { alert("Error: Acceso al micrófono denegado o conexión no segura (HTTPS)."); }
    }

    function vincular(call) {
        call.on('stream', stream => {
            if (!conexiones[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = stream; audio.autoplay = true; audio.playsinline = true;
                document.getElementById('audios').appendChild(audio);
                conexiones[call.peer] = true;
                actualizarUI();
            }
        });
        call.on('close', () => { delete conexiones[call.peer]; actualizarUI(); });
    }

    function actualizarUI() {
        const total = Object.keys(conexiones).length;
        document.getElementById('user-count').innerText = `${total} Compañeros conectados`;
        document.getElementById('status').innerText = total > 0 ? "SEÑAL RECIBIDA" : "ESCANEANDO...";
        document.getElementById('ptt').classList.add('ready');
    }

    const ptt = document.getElementById('ptt');
    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('status').innerText = on ? "TRANSMITIENDO..." : "SEÑAL RECIBIDA";
            document.getElementById('status').style.color = on ? "#f00" : "#0f0";
        }
    }
    ptt.onmousedown = ptt.ontouchstart = (e) => { e.preventDefault(); hablar(true); };
    ptt.onmouseup = ptt.ontouchend = (e) => { e.preventDefault(); hablar(false); };
</script>
</body>
</html>
