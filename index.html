<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Global V3</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--neon); text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .panel { border: 2px solid var(--neon); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--neon); color: var(--neon); border-radius: 10px; font-size: 1.2rem; text-align: center; box-sizing: border-box; }
        .btn-link { width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        #ptt { 
            width: 200px; height: 200px; border-radius: 50%; background: #111; 
            border: 8px solid #222; margin: 20px auto; display: none;
            color: #444; font-weight: bold; font-size: 1.2rem;
            user-select: none; -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        #ptt.active { display: block; border-color: #00ff41; color: var(--neon); box-shadow: 0 0 15px rgba(0,255,65,0.3); }
        #ptt:active { background: #f00; color: #fff; border-color: #500; transform: scale(0.95); box-shadow: 0 0 30px #f00; }
        .info { font-size: 0.9rem; margin: 10px 0; color: #888; }
        #log { font-size: 0.7rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h1 style="margin-top:0; font-size: 1.5rem;">RADIO GLOBAL V3</h1>
    
    <div id="login">
        <input type="text" id="roomName" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-link" onclick="conectar()">ESTABLECER CONEXIÓN</button>
        <p class="info">Usa el mismo nombre de grupo con tus amigos.</p>
    </div>

    <div id="radio-controls" style="display:none">
        <div id="status">INICIALIZANDO...</div>
        <div id="peer-count" style="margin-bottom: 15px;">Conectando a la red...</div>
        <button id="ptt">PULSAR PARA HABLAR</button>
        <div id="log">Esperando señal de audio...</div>
    </div>
</div>

<div id="remote-audios"></div>

<script>
    // TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyD73Fli73cewNUX-Rj6YeZKlb97AcMrqL0",
        authDomain: "bodega-virtual-3e69b.firebaseapp.com",
        databaseURL: "https://bodega-virtual-3e69b-default-rtdb.firebaseio.com",
        projectId: "bodega-virtual-3e69b",
        appId: "1:889100967352:web:c626d959183115806d834d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, room;
    let activeConnections = {};

    async function conectar() {
        room = document.getElementById('roomName').value.trim().toLowerCase();
        if(!room) return alert("Escribe un nombre de grupo");

        try {
            // Captura de audio optimizada
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            document.getElementById('login').style.display = 'none';
            document.getElementById('radio-controls').style.display = 'block';

            // Configuración con SERVIDORES TURN (Puentes para 4G y ciudades)
            peer = new Peer('ID-' + Math.random().toString(36).substr(2, 9), {
                config: {
                    'iceServers': [
                        { 'urls': 'stun:stun.l.google.com:19302' },
                        { 'urls': 'turn:openrelay.metered.ca:443', 'username': 'openrelayprovider', 'credential': 'openrelayprovider' }
                    ]
                }
            });

            peer.on('open', (id) => {
                document.getElementById('status').innerText = "ONLINE - GRUPO: " + room.toUpperCase();
                document.getElementById('ptt').classList.add('active');
                
                const roomRef = db.ref(`radio_v3/${room}`);
                roomRef.child(id).set(true);
                roomRef.child(id).onDisconnect().remove();

                // Detección automática de compañeros
                roomRef.on('child_added', snap => {
                    const peerId = snap.key;
                    if (peerId !== id && !activeConnections[peerId]) {
                        console.log("Llamando a:", peerId);
                        const call = peer.call(peerId, localStream);
                        manejarLlamada(call);
                    }
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                manejarLlamada(call);
            });

        } catch (err) {
            alert("Error: Activa el micrófono y usa HTTPS.");
            console.error(err);
        }
    }

    function manejarLlamada(call) {
        call.on('stream', remoteStream => {
            if (!activeConnections[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                audio.playsinline = true;
                document.getElementById('remote-audios').appendChild(audio);
                activeConnections[call.peer] = call;
                
                // Forzar reproducción por políticas de navegador
                audio.play().catch(() => {
                    document.getElementById('log').innerText = "Toca la pantalla para activar sonido";
                });
                
                actualizarContador();
            }
        });

        call.on('close', () => {
            delete activeConnections[call.peer];
            actualizarContador();
        });
    }

    function actualizarContador() {
        const count = Object.keys(activeConnections).length;
        document.getElementById('peer-count').innerText = (count + 1) + " Equipos en la red";
        document.getElementById('log').innerText = count > 0 ? "Enlace establecido" : "Esperando a otros...";
    }

    // Lógica del botón PTT
    const btn = document.getElementById('ptt');
    function toggleMic(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('status').innerText = on ? "🔴 TRANSMITIENDO..." : "ONLINE - GRUPO: " + room.toUpperCase();
            document.getElementById('status').style.color = on ? "#f00" : "#00ff41";
        }
    }

    btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); toggleMic(true); };
    btn.onmouseup = btn.ontouchend = (e) => { e.preventDefault(); toggleMic(false); };

</script>
</body>
</html>
