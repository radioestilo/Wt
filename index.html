<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Motorola Ultra</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --lcd-bg: #94b447; --lcd-text: #1a1f0e; --lcd-tx: #ffb100; }
        body { background: #121212; color: white; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .walkie-body { background: #2a2a2a; width: 310px; padding: 40px 20px; border-radius: 40px; border: 5px solid #111; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .screen { background: var(--lcd-bg); border: 8px solid #1a1a1a; border-radius: 5px; padding: 15px; height: 90px; color: var(--lcd-text); display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; }
        .screen.transmitting { background: var(--lcd-tx); }
        #header-display { font-size: 1rem; font-weight: bold; margin: 0; text-transform: uppercase; }
        #status-lcd { font-size: 0.8rem; margin-top: 5px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.2); padding-top: 5px; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 2px solid #444; color: #0f0; text-align: center; border-radius: 5px; font-family: inherit; box-sizing: border-box; }
        .btn-enter { width: 100%; padding: 15px; background: #333; color: #eee; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; box-shadow: 0 4px #000; }
        #ptt { width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(#800, #400); border: 10px solid #222; margin: 25px auto 0; display: none; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; box-shadow: 0 10px #111; }
        #ptt.ready { display: block; }
        #ptt:active { background: radial-gradient(#f00, #900); transform: translateY(5px); box-shadow: 0 4px #111; }
        .led { width: 10px; height: 10px; background: #300; border-radius: 50%; position: absolute; top: 20px; right: 50px; border: 2px solid #111; }
        .led.on { background: #f00; box-shadow: 0 0 12px #f00; }
    </style>
</head>
<body>

<div class="walkie-body">
    <div class="led" id="tx-led"></div>
    <div class="screen" id="lcd">
        <h2 id="header-display">RADIO OFF</h2>
        <div id="status-lcd">INGRESE GRUPO</div>
    </div>
    <div id="setup">
        <input type="text" id="room" placeholder="NOMBRE DEL GRUPO">
        <button class="btn-enter" onclick="iniciarRadio()">CONECTAR</button>
    </div>
    <button id="ptt"></button>
</div>

<div id="audios"></div>

<script>
    // Firebase para encontrar IDs
    const firebaseConfig = { databaseURL: "https://walkie-p2p-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let peer, localStream, myRoom;
    let conexionesActivas = {};
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBip(frec, dur) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = frec;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    async function iniciarRadio() {
        myRoom = document.getElementById('room').value.trim().toUpperCase();
        if (!myRoom) return;

        try {
            // Configuración de audio forzada
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream.getAudioTracks()[0].enabled = false;

            // Configuración con servidores STUN para saltar bloqueos
            peer = new Peer("MOTO-" + Math.random().toString(36).substr(2, 6), {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('ptt').classList.add('ready');
                document.getElementById('header-display').innerText = myRoom;
                document.getElementById('status-lcd').innerText = "BUSCANDO...";
                playBip(880, 0.1);

                const ref = db.ref(`rooms/${myRoom}/${id}`);
                ref.set(true);
                ref.onDisconnect().remove();

                db.ref(`rooms/${myRoom}`).on('value', snapshot => {
                    const users = snapshot.val() || {};
                    const ids = Object.keys(users);
                    
                    ids.forEach(remoteId => {
                        if (remoteId !== id && !conexionesActivas[remoteId]) {
                            const call = peer.call(remoteId, localStream);
                            manejarLlamada(call);
                        }
                    });
                    document.getElementById('status-lcd').innerText = `${ids.length} EN LINEA`;
                });
            });

            peer.on('call', call => {
                call.answer(localStream);
                manejarLlamada(call);
            });

        } catch (e) { alert("Error: Use HTTPS y permita el micrófono."); }
    }

    function manejarLlamada(call) {
        call.on('stream', remoteStream => {
            if (!conexionesActivas[call.peer]) {
                const audio = document.createElement('audio');
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                audio.playsinline = true; // Necesario para móviles
                document.getElementById('audios').appendChild(audio);
                conexionesActivas[call.peer] = call;
                playBip(1200, 0.1);
            }
        });
    }

    function hablar(on) {
        if (localStream) {
            localStream.getAudioTracks()[0].enabled = on;
            document.getElementById('tx-led').classList.toggle('on', on);
            document.getElementById('lcd').classList.toggle('transmitting', on);
            document.getElementById('status-lcd').innerText = on ? "TRANSMITIENDO" : `${Object.keys(conexionesActivas).length + 1} EN LINEA`;
            playBip(on ? 600 : 300, 0.05);
        }
    }

    const ptt = document.getElementById('ptt');
    ptt.onmousedown = ptt.ontouchstart = (e) => { e.preventDefault(); hablar(true); };
    ptt.onmouseup = ptt.ontouchend = (e) => { e.preventDefault(); hablar(false); };
</script>
</body>
</html>
