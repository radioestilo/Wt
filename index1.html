<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Comms Ultra v4.5</title>
    <style>
        :root { --danger: #ff4b2b; --success: #00ff41; --dark: #0f0f0f; --neon: #00d4ff; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; overflow: hidden; }

        .radio-container { position: relative; width: 300px; height: 450px; background: #222; border-radius: 40px; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        #display { width: 85%; height: 80px; background: #0a1a0a; border: 2px solid #333; border-radius: 10px; margin-bottom: 20px; padding: 10px; color: var(--success); font-family: monospace; font-size: 0.75rem; box-shadow: inset 0 0 15px #000; display: flex; flex-direction: column; justify-content: space-between; }

        .user-count { color: var(--neon); font-weight: bold; font-size: 0.8rem; }

        #ptt-btn { width: 160px; height: 160px; border-radius: 50%; border: 10px solid #111; background: #333; color: #555; font-size: 1.2rem; font-weight: bold; cursor: pointer; outline: none; transition: 0.2s; -webkit-tap-highlight-color: transparent; }

        .ready { background: radial-gradient(circle, var(--danger) 0%, #8b0000 100%) !important; color: white !important; border-color: #444 !important; box-shadow: 0 0 25px rgba(255,0,0,0.4); }
        .active { transform: scale(0.92); filter: brightness(1.3); box-shadow: 0 0 50px var(--danger) !important; }

        .led { width: 12px; height: 12px; border-radius: 50%; background: #000; margin-bottom: 10px; border: 2px solid #333; }
        .led-on { background: var(--success); box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>

    <div class="radio-container">
        <div id="led" class="led"></div>
        <div id="display">
            <div id="status-line">SISTEMA APAGADO</div>
            <div class="user-count">EN LÍNEA: <span id="counter">0</span></div>
        </div>
        <button id="ptt-btn">ENCENDER</button>
        <p style="font-size: 0.6rem; color: #555; margin-top: 30px;">SECURE COMMS v4.5 | REPEATER MODE</p>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

    <script>
        const APP_ID = "ac7885d72d594551a5bb3cc540ba4ef6";
        const CHANNEL = "sala-general";
        
        const btn = document.getElementById('ptt-btn');
        const statusLine = document.getElementById('status-line');
        const counterText = document.getElementById('counter');
        const led = document.getElementById('led');

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack = null;
        let isOnline = false;

        // --- SISTEMA DE AUDIO (SINTETIZADOR) ---
        function playTone(freq, vol, dur) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = freq;
                g.gain.setValueAtTime(vol, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                o.start(); o.stop(ctx.currentTime + dur);
            } catch(e) { console.error("Audio error"); }
        }

        // Tono de Repetidor Analógico (Roger Beep clásico)
        function playCourtesyTone() {
            // Un tono de 880Hz (agudo) durante 150ms suena como repetidor real
            playTone(880, 0.1, 0.15); 
        }

        // --- NOTIFICACIONES ---
        async function requestNotifyPermission() {
            if ("Notification" in window) await Notification.requestPermission();
        }

        function sendNotification(title, body) {
            if (document.visibilityState === "hidden" && Notification.permission === "granted") {
                new Notification(title, { body: body });
            }
        }

        // --- CONTEO ---
        function updatePeerCount() {
            counterText.innerText = client.remoteUsers.length + 1;
        }

        async function bootSystem() {
            try {
                statusLine.innerText = "CONECTANDO...";
                await requestNotifyPermission();
                await client.join(APP_ID, CHANNEL, null, null);
                
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true });
                await client.publish(localAudioTrack);
                await localAudioTrack.setEnabled(false);

                isOnline = true;
                btn.innerText = "PTT";
                btn.classList.add('ready');
                led.classList.add('led-on');
                statusLine.innerText = "CANAL: GENERAL";
                updatePeerCount();
                playTone(440, 0.1, 0.2); // Tono de encendido

            } catch (err) {
                statusLine.innerText = "ERROR: PERMISO DENIEG.";
                btn.innerText = "REINTENTAR";
            }
        }

        // --- EVENTOS DE AGORA ---
        client.on("user-joined", () => {
            updatePeerCount();
            playTone(1200, 0.2, 0.3); // Alerta de nuevo integrante
            sendNotification("Radio", "Alguien entró a la frecuencia.");
        });

        client.on("user-left", () => updatePeerCount());

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                statusLine.innerText = "RECIBIENDO...";
                user.audioTrack.play();
            }
        });

        // ESTA ES LA CLAVE: Detecta cuando el OTRO deja de hablar
        client.on("user-unpublished", (user, mediaType) => {
            if (mediaType === "audio") {
                statusLine.innerText = "CANAL: GENERAL";
                playCourtesyTone(); // <--- Aquí suena el tono de repetidor para los que escuchan
            }
        });

        // --- LÓGICA PTT ---
        btn.onpointerdown = async (e) => {
            if (!isOnline) { await bootSystem(); return; }
            e.preventDefault();
            await localAudioTrack.setEnabled(true);
            btn.classList.add('active');
            statusLine.innerText = "TRANSMITIENDO...";
        };

        btn.onpointerup = async () => {
            if (!isOnline) return;
            await localAudioTrack.setEnabled(false);
            btn.classList.remove('active');
            statusLine.innerText = "CANAL: GENERAL";
            playCourtesyTone(); // <--- Tono local para confirmar cierre
        };

        btn.onpointerleave = btn.onpointerup;
    </script>
</body>
</html>
